name: Renovate

on:
  workflow_dispatch:
    inputs:
      renovateVersion:
        description: The version of Renovate to use. Leave empty to use the latest version.
        required: false
        default: ''
      renovateLogLevel:
        description: The log level for Renovate.
        required: false
        default: info
        type: choice
        options:
          - trace
          - debug
          - info
          - warn
          - error
          - fatal

jobs:
  renovate:
    runs-on: ubuntu-24.04
    steps:
      - name: Generate token
        id: renovate-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.RENOVATE_APP_ID }}
          private-key: ${{ secrets.RENOVATE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Renovate
        uses: renovatebot/github-action@693b9ef15eec82123529a37c782242f091365961 # v46.1.14
        with:
          token: ${{ steps.renovate-token.outputs.token }}
          renovate-version: ${{ inputs.renovateVersion }}
        env:
          LOG_LEVEL: ${{ inputs.renovateLogLevel }}
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          RENOVATE_ONBOARDING: false
