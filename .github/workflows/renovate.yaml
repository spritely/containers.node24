name: Renovate

on:
  workflow_dispatch:
  # Daily at 12:40AM EST (5:40AM UTC), with a second run at 12:50AM EST (5:50AM UTC)
  # Tier 3 dependency: actions.publish-container -> actions.semantic-version -> containers.base
  # Run 1 creates PRs, CI validates, Run 2 auto-merges 10 minutes apart.
  schedule:
    - cron: '40 5 * * *'
    - cron: '50 5 * * *'

jobs:
  renovate:
    runs-on: ubuntu-24.04
    steps:
      - name: Generate token
        id: renovate-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ secrets.RENOVATE_APP_ID }}
          private-key: ${{ secrets.RENOVATE_APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Renovate
        uses: renovatebot/github-action@79dc0ba74dc3de28db0a7aeb1d0b95d5bf5fde2a # v46.1.13
        with:
          token: ${{ steps.renovate-token.outputs.token }}
        env:
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          RENOVATE_ONBOARDING: false
