name: Renovate

on:
  workflow_dispatch:
    inputs:
      renovateVersion:
        description: The version of Renovate to use. Leave empty to use the latest version.
        required: false
        default: ''
      renovateLogLevel:
        description: The log level for Renovate.
        required: false
        default: info
        type: choice
        options:
          - trace
          - debug
          - info
          - warn
          - error
          - fatal

jobs:
  renovate:
    runs-on: ubuntu-24.04
    steps:
      - name: Generate token
        id: renovate-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.RENOVATE_APP_ID }}
          private-key: ${{ secrets.RENOVATE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Renovate
        uses: renovatebot/github-action@8217b3fc286df088d7c27f3255fe8414463bc0fd # v46.1.15
        with:
          token: ${{ steps.renovate-token.outputs.token }}
          renovate-version: ${{ inputs.renovateVersion }}
        env:
          LOG_LEVEL: ${{ inputs.renovateLogLevel }}
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          RENOVATE_ONBOARDING: false
