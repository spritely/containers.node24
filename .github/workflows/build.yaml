name: Build and Publish Container

on: [push, workflow_dispatch]

permissions:
    checks: write # Required for test reporting
    contents: write # Required for pushing tags

jobs:
  build:
    # Available runners: https://github.com/actions/runner-images
    runs-on: ubuntu-24.04

    steps:
      - id: version
        name: Get semantic version
        uses: spritely/actions.semantic-version/get@a351efa8a15f729098fa31990f5d01c9765eb000 # v0.7.54
        with:
          writeSummary: true

      - name: Create .env for build
        shell: bash
        run: touch ./.devcontainer/.env

      - name: Run tests
        uses: devcontainers/ci@b63b30de439b47a52267f241112c5b453b673db5 # v0.3.1900000449
        with:
          runCmd: |
            bats --report-formatter junit --output . ./tests/
          push: never

      - name: Generate test report
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        if: always()
        with:
          name: Test Results
          path: report.xml
          reporter: java-junit

      - name: Build and publish container
        uses: spritely/actions.publish-container@2d429f83d9651c1fcef21c846170597d4be96e9e # v0.2.57
        with:
          registryUsername: ${{ secrets.DOCKER_HUB_USERNAME }}
          registryPassword: ${{ secrets.DOCKER_HUB_TOKEN }}
          registryHost: docker.io
          context: ./src
          dockerfile: ./src/Containerfile
          imageNames: spritelydev/node24-devcontainer
          version: ${{ steps.version.outputs.version }}
          writeSummary: true

      - name: Apply semantic version
        if: ${{ steps.version.outputs.branchName == github.event.repository.default_branch }}
        uses: spritely/actions.semantic-version/apply@a351efa8a15f729098fa31990f5d01c9765eb000 # v0.7.54
        with:
          version: ${{ steps.version.outputs.version }}
